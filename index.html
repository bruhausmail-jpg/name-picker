<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin Wheel</title>

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; text-align:center; }
.container { padding:16px; }

textarea {
  width:90%; max-width:600px; height:120px; margin-bottom:10px;
}

button {
  padding:10px 18px; margin:4px; border-radius:8px;
  border:none; background:#0b79d0; color:white; cursor:pointer;
}

.wheel-wrap {
  position:relative; width:340px; height:340px; margin:10px auto;
}

canvas { width:340px; height:340px; }

.pointer {
  position:absolute; top:0; left:50%;
  transform:translateX(-50%) rotate(0deg);
  border-left:8px solid transparent;
  border-right:8px solid transparent;
  border-top:50px solid red;
  transform-origin:50% 10%;
  transition: transform 0.05s ease;
}

.result { font-size:24px; margin-top:10px; }
</style>
</head>

<body>
<div class="container">
<h2>Spin the Wheel</h2>

<textarea id="names"></textarea><br>

<button onclick="build()">Build</button>
<button onclick="spin()">Spin</button>
<button onclick="clearNames()">Clear</button>

<div class="wheel-wrap">
<div class="pointer" id="pointer"></div>
<canvas id="c" width="340" height="340"></canvas>
</div>

<div class="result" id="result">Winner: —</div>
</div>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");
const input = document.getElementById("names");
const pointer = document.getElementById("pointer");

const KEY="wheel_v5";

let items=[];
let rot=0;
let lastTick=-1;
let winnerIndex=-1;

// AUDIO
let audioCtx=null;
function playClick(){
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  let osc=audioCtx.createOscillator();
  let gain=audioCtx.createGain();

  osc.type="square";
  osc.frequency.value=1200;

  gain.gain.setValueAtTime(0.001,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.1,audioCtx.currentTime+0.01);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.04);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime+0.05);
}

function save(){ localStorage.setItem(KEY,input.value); }
function load(){ input.value=localStorage.getItem(KEY)||"Bob\nSue\nMike\nJen"; }

function clearNames(){
  localStorage.removeItem(KEY);
  input.value=""; items=[]; draw();
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function build(){
  save();
  let base=input.value.split("\n").map(x=>x.trim()).filter(x=>x);
  let rep=[];
  for(let i=0;i<3;i++) rep.push(...base);
  items=shuffle(rep);
  rot=0;
  winnerIndex=-1;
  draw();
}

function draw(){
  ctx.clearRect(0,0,340,340);
  if(!items.length) return;

  let arc=Math.PI*2/items.length;

  for(let i=0;i<items.length;i++){
    let a=rot+i*arc;

    ctx.beginPath();
    ctx.moveTo(170,170);
    ctx.arc(170,170,150,a,a+arc);

    if(i===winnerIndex){
      ctx.shadowColor="gold";
      ctx.shadowBlur=20;
    } else {
      ctx.shadowBlur=0;
    }

    ctx.fillStyle="hsl("+(i*30)+",80%,60%)";
    ctx.fill();

    ctx.save();
    ctx.translate(170,170);
    ctx.rotate(a+arc/2);
    ctx.fillStyle="#fff";
    ctx.font="12px Arial";
    ctx.fillText(items[i],130,0);
    ctx.restore();
  }

  // dots
  for(let i=0;i<items.length;i++){
    let a=rot+i*arc;
    let x=170+Math.cos(a)*145;
    let y=170+Math.sin(a)*145;

    ctx.beginPath();
    ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle="#000";
    ctx.fill();
  }
}

function tick(index){
  if(index!==lastTick){
    lastTick=index;

    pointer.style.transform="translateX(-50%) rotate(10deg)";
    setTimeout(()=>{
      pointer.style.transform="translateX(-50%) rotate(0deg)";
    },50);

    playClick();
  }
}

function spin(){
  let start=performance.now();
  let target=rot+Math.PI*2*(10+Math.random()*3);

  function anim(t){
    let p=Math.min((t-start)/7000,1);
    let eased=1-Math.pow(1-p,4);

    rot=rot+(target-rot)*eased;
    draw();

    let arc=Math.PI*2/items.length;
    let pointerAngle=-Math.PI/2;
    let adj=(pointerAngle-rot)%(Math.PI*2);
    if(adj<0) adj+=Math.PI*2;

    let index=Math.floor(adj/arc);
    tick(index);

    if(p<1){
      requestAnimationFrame(anim);
    } else {
      // bounce effect
      let bounce=0.15;
      rot+=bounce;
      draw();

      setTimeout(()=>{
        rot-=bounce*1.5;
        draw();

        setTimeout(()=>{
          rot+=bounce*0.5;
          draw();

          winnerIndex=index;
          draw();

          document.getElementById("result").textContent="Winner: "+items[index];
        },80);

      },80);
    }
  }

  requestAnimationFrame(anim);
}

load();
build();
</script>

</body>
</html>
