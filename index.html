<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin Wheel</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
  text-align: center;
}

.container {
  padding: 16px;
}

textarea {
  width: 90%;
  max-width: 600px;
  height: 120px;
  margin-bottom: 10px;
}

button {
  padding: 10px 18px;
  margin: 4px;
  border-radius: 8px;
  border: none;
  background: #0b79d0;
  color: white;
  cursor: pointer;
}

.wheel-wrap {
  position: relative;
  width: 340px;
  height: 340px;
  margin: 10px auto;
}

canvas {
  width: 340px;
  height: 340px;
}

/* thinner + longer pointer */
.pointer {
  position: absolute;
  top: 0px;
  left: 50%;
  transform: translateX(-50%) rotate(0deg);
  width: 0;
  height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 50px solid red;
  transform-origin: 50% 10%;
  transition: transform 0.05s ease;
}

.result {
  font-size: 24px;
  margin-top: 10px;
}
</style>
</head>

<body>
<div class="container">
<h2>Spin the Wheel</h2>

<textarea id="names"></textarea><br>

<button onclick="build()">Build</button>
<button onclick="spin()">Spin</button>
<button onclick="clearNames()">Clear</button>

<div class="wheel-wrap">
<div class="pointer" id="pointer"></div>
<canvas id="c" width="340" height="340"></canvas>
</div>

<div class="result" id="result">Winner: —</div>
</div>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");
const input = document.getElementById("names");
const pointer = document.getElementById("pointer");

const KEY = "wheel_v4";

let items = [];
let rot = 0;
let lastTick = -1;

function save(){ localStorage.setItem(KEY, input.value); }
function load(){ input.value = localStorage.getItem(KEY) || "Bob\nSue\nMike\nJen"; }

function clearNames(){
  localStorage.removeItem(KEY);
  input.value="";
  items=[];
  draw();
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function build(){
  save();
  let base = input.value.split("\n").map(x=>x.trim()).filter(x=>x);
  let rep=[];
  for(let i=0;i<3;i++) rep.push(...base);
  items = shuffle(rep);
  rot=0;
  draw();
}

function draw(){
  ctx.clearRect(0,0,340,340);
  if(!items.length) return;

  let arc = Math.PI*2/items.length;

  for(let i=0;i<items.length;i++){
    let a = rot + i*arc;

    ctx.beginPath();
    ctx.moveTo(170,170);
    ctx.arc(170,170,150,a,a+arc);
    ctx.fillStyle = "hsl("+(i*30)+",80%,60%)";
    ctx.fill();

    ctx.save();
    ctx.translate(170,170);
    ctx.rotate(a+arc/2);
    ctx.fillStyle="#fff";
    ctx.font="12px Arial";
    ctx.fillText(items[i],130,0);
    ctx.restore();
  }

  // BLACK DOTS
  for(let i=0;i<items.length;i++){
    let a = rot + i*arc;
    let x = 170 + Math.cos(a)*145;
    let y = 170 + Math.sin(a)*145;

    ctx.beginPath();
    ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle="#000"; // <<< black dots
    ctx.fill();
  }
}

function tickEffect(index){
  if(index!==lastTick){
    lastTick=index;

    // flap animation
    pointer.style.transform = "translateX(-50%) rotate(8deg)";
    setTimeout(()=>{
      pointer.style.transform = "translateX(-50%) rotate(0deg)";
    },50);
  }
}

function spin(){
  let start = performance.now();
  let target = rot + Math.PI*2*(10+Math.random()*3);

  function anim(t){
    let p = Math.min((t-start)/7000,1);
    let eased = 1-Math.pow(1-p,4);

    rot = rot + (target-rot)*eased;
    draw();

    let arc = Math.PI*2/items.length;
    let pointerAngle = -Math.PI/2;
    let adj = (pointerAngle - rot)%(Math.PI*2);
    if(adj<0) adj+=Math.PI*2;

    let index = Math.floor(adj/arc);
    tickEffect(index);

    if(p<1){
      requestAnimationFrame(anim);
    } else {
      document.getElementById("result").textContent =
        "Winner: " + items[index];
    }
  }

  requestAnimationFrame(anim);
}

load();
build();
</script>

</body>
</html>
