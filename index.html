<!DOCTYPE html>
<html>
<head>
  <title>Name Picker</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }
    input {
      display: block;
      margin: 10px auto;
      padding: 8px;
      width: 200px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>🎯 Random Name Picker</h1>

  <input type="text" id="name1" placeholder="Enter name 1">
  <input type="text" id="name2" placeholder="Enter name 2">
  <input type="text" id="name3" placeholder="Enter name 3">
  <input type="text" id="name4" placeholder="Enter name 4">

  <button onclick="pickName()">Pick a Name</button>

  <div id="result"></div>

  <script>
    function pickName() {
      const names = [
        document.getElementById("name1").value,
        document.getElementById("name2").value,
        document.getElementById("name3").value,
        document.getElementById("name4").value
      ].filter(name => name.trim() !== "");

      if (names.length === 0) {
        document.getElementById("result").innerText = "Please enter at least one name!";
        return;
      }

      const randomIndex = Math.floor(Math.random() * names.length);
      document.getElementById("result").innerText = `🎉 Selected: ${names[randomIndex]}`;
    }
  </script>

</body>
</html>
