<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spin Wheel</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f4;
      text-align: center;
      color: #222;
    }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    h1 { margin-bottom: 10px; }
    .controls { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 20px; }
    textarea { width: 320px; height: 140px; padding: 10px; font-size: 16px; border-radius: 8px; }
    button { padding: 12px 22px; font-size: 16px; border-radius: 8px; background: #0077cc; color: white; cursor: pointer; }
    button:hover { background: #005fa3; }
    .wheel-wrap { position: relative; width: 520px; height: 520px; margin: 0 auto; }
    canvas { background: white; border-radius: 50%; box-shadow: 0 4px 14px rgba(0, 0, 0, 0.15); }
    .pointer {
      position: absolute;
      top: -4px;
      left: 50%;
      transform: translateX(-50%);
      border-left: 22px solid transparent;
      border-right: 22px solid transparent;
      border-bottom: 38px solid #d62828;
    }
    .result { margin-top: 22px; font-size: 24px; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Spin the Wheel</h1>
    <div class="controls">
      <textarea id="namesInput">Bob
Sue
Mike
Jen</textarea>
      <div>
        <button id="buildBtn">Build Wheel</button>
        <button id="spinBtn">Spin</button>
      </div>
    </div>
    <div class="wheel-wrap">
      <div class="pointer"></div>
      <canvas id="wheelCanvas" width="500" height="500"></canvas>
    </div>
    <div class="result" id="resultText">Winner: —</div>
  </div>

<script>
const canvas = document.getElementById("wheelCanvas");
const ctx = canvas.getContext("2d");
const namesInput = document.getElementById("namesInput");
const resultText = document.getElementById("resultText");

let wheelItems = [];
let rotation = 0;

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function buildWheel(){
  let names = namesInput.value.split("\n").map(n=>n.trim()).filter(n=>n);
  let repeated=[];
  for(let i=0;i<4;i++){ repeated.push(...names); }
  wheelItems = shuffle(repeated);
  draw();
}

function draw(){
  ctx.clearRect(0,0,500,500);
  let arc = (Math.PI*2)/wheelItems.length;
  for(let i=0;i<wheelItems.length;i++){
    let angle = rotation + i*arc;
    ctx.beginPath();
    ctx.moveTo(250,250);
    ctx.arc(250,250,230,angle,angle+arc);
    ctx.fillStyle = "hsl("+(i*30)+",80%,60%)";
    ctx.fill();
    ctx.save();
    ctx.translate(250,250);
    ctx.rotate(angle+arc/2);
    ctx.fillStyle="#fff";
    ctx.fillText(wheelItems[i],200,0);
    ctx.restore();
  }
}

function spin(){
  let target = rotation + Math.PI*2*(10+Math.random()*5);
  let start = performance.now();
  function anim(t){
    let p = Math.min((t-start)/6000,1);
    let eased = 1-Math.pow(1-p,3);
    rotation = rotation + (target-rotation)*eased;
    draw();
    if(p<1){ requestAnimationFrame(anim); }
    else{
      let index = Math.floor(((Math.PI*2 - (rotation%(Math.PI*2))) / (Math.PI*2)) * wheelItems.length);
      resultText.textContent = "Winner: " + wheelItems[index];
    }
  }
  requestAnimationFrame(anim);
}

document.getElementById("buildBtn").onclick = buildWheel;
document.getElementById("spinBtn").onclick = spin;

buildWheel();
</script>
</body>
</html>
