<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin Wheel</title>

<style>
body {margin:0;font-family:Arial;background:#f3f3f3;text-align:center;}
.container {padding:20px;}

textarea {width:90%;max-width:600px;height:120px;margin-bottom:10px;}

button {padding:10px 18px;margin:4px;border-radius:8px;border:none;background:#147bd1;color:white;}

.wheel-wrap {
  position:relative;
  width:340px;
  height:360px;
  margin:10px auto;
}

canvas {
  width:340px;
  height:340px;
  margin-top:20px; /* push wheel DOWN */
}

/* FIXED POINTER POSITION */
.pointer {
  position:absolute;
  top:0px;  /* sits ABOVE wheel */
  left:50%;
  transform:translateX(-50%);
  height:70px;
  width:20px;
  z-index:50;
}

.pointer-arm {
  width:6px;
  height:50px;
  background:#c91515;
  margin:0 auto;
  border-radius:6px;
  transform-origin:bottom center;
  transition:transform 0.05s ease;
}

.pointer-tip {
  width:0;
  height:0;
  margin:0 auto;
  border-left:7px solid transparent;
  border-right:7px solid transparent;
  border-bottom:14px solid #c91515;
}

.result {font-size:24px;margin-top:10px;}
</style>
</head>

<body>
<div class="container">
<h2>Spin the Wheel</h2>

<textarea id="names"></textarea><br>

<button onclick="build()">Build</button>
<button onclick="spin()">Spin</button>

<div class="wheel-wrap">
<div class="pointer">
  <div class="pointer-arm" id="arm"></div>
  <div class="pointer-tip"></div>
</div>
<canvas id="c" width="340" height="340"></canvas>
</div>

<div class="result" id="result">Winner: —</div>
</div>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");
const input=document.getElementById("names");
const arm=document.getElementById("arm");

let items=[],rot=0,last=-1;

function build(){
 let base=input.value.split("\n").map(x=>x.trim()).filter(x=>x);
 let rep=[];
 for(let i=0;i<3;i++) rep.push(...base);
 items=rep;
 draw();
}

function draw(){
 ctx.clearRect(0,0,340,340);
 let arc=Math.PI*2/items.length;

 for(let i=0;i<items.length;i++){
  let a=rot+i*arc;

  ctx.beginPath();
  ctx.moveTo(170,170);
  ctx.arc(170,170,150,a,a+arc);
  ctx.fillStyle="hsl("+(i*30)+",70%,55%)";
  ctx.fill();

  ctx.strokeStyle="#fff";
  ctx.stroke();

  ctx.save();
  ctx.translate(170,170);
  ctx.rotate(a+arc/2);
  ctx.fillStyle="#fff";
  ctx.fillText(items[i],120,0);
  ctx.restore();
 }

 ctx.beginPath();
 ctx.arc(170,170,150,0,Math.PI*2);
 ctx.lineWidth=4;
 ctx.strokeStyle="#222";
 ctx.stroke();
}

function flap(){
 arm.style.transform="rotate(12deg)";
 setTimeout(()=>arm.style.transform="rotate(0deg)",60);
}

function spin(){
 let start=performance.now();
 let target=rot+Math.PI*2*(10+Math.random()*3);

 function anim(t){
  let p=Math.min((t-start)/7000,1);
  let eased=1-Math.pow(1-p,3);

  rot=rot+(target-rot)*eased;
  draw();

  let arc=Math.PI*2/items.length;
  let pointer=-Math.PI/2;
  let adj=(pointer-rot)%(Math.PI*2);
  if(adj<0) adj+=Math.PI*2;
  let idx=Math.floor(adj/arc);

  if(idx!==last){
    last=idx;
    flap();
  }

  if(p<1){
    requestAnimationFrame(anim);
  } else {
    document.getElementById("result").textContent="Winner: "+items[idx];
  }
 }

 requestAnimationFrame(anim);
}

input.value="Bob\nSue\nMike\nJen";
build();
</script>

</body>
</html>
