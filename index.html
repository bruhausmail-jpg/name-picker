<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Name Picker Pro</title>
<style>
body { font-family: Arial; text-align: center; background:#111; color:white; }
canvas { margin-top:20px; }
button { padding:12px 20px; margin:10px; font-size:16px; border-radius:10px; }
</style>
</head>
<body>

<h1>Name Picker 🎡</h1>

<input id="n1" placeholder="Name 1"><br>
<input id="n2" placeholder="Name 2"><br>
<input id="n3" placeholder="Name 3"><br>
<input id="n4" placeholder="Name 4"><br>

<button id="spin">SPIN</button>

<canvas id="wheel" width="300" height="300"></canvas>

<h2 id="winner"></h2>

<script>
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const spinBtn = document.getElementById('spin');
const winnerText = document.getElementById('winner');

let angle = 0;
let spinning = false;

// 🔊 REAL SOUNDS
const sounds = {
  tick: new Audio('https://assets.mixkit.co/sfx/preview/mixkit-click-metallic-1104.mp3'),
  win: new Audio('https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3')
};
sounds.tick.volume = 0.4;
sounds.win.volume = 0.7;

// unlock audio on iPhone
spinBtn.addEventListener('click', () => {
  sounds.tick.play().catch(()=>{});
  sounds.win.play().catch(()=>{});
});

function getNames(){
  return [n1.value, n2.value, n3.value, n4.value].filter(n => n);
}

function drawWheel(){
  const names = getNames();
  ctx.clearRect(0,0,300,300);
  if(names.length === 0) return;

  const slice = (Math.PI*2)/names.length;

  names.forEach((name,i)=>{
    const start = i*slice + angle;
    const end = start + slice;

    ctx.beginPath();
    ctx.moveTo(150,150);
    ctx.arc(150,150,140,start,end);
    ctx.fillStyle = `hsl(${i*90},70%,60%)`;
    ctx.fill();

    ctx.save();
    ctx.translate(150,150);
    ctx.rotate(start + slice/2);
    ctx.fillStyle = "#000";
    ctx.fillText(name,100,0);
    ctx.restore();
  });
}

function tickSound(){
  sounds.tick.currentTime = 0;
  sounds.tick.play();
}

function winSound(){
  sounds.win.currentTime = 0;
  sounds.win.play();
}

function getWinner(names){
  const slice = (Math.PI*2)/names.length;
  let index = Math.floor((names.length - ((angle % (Math.PI*2))/slice)) % names.length);
  return names[index];
}

function spin(){
  if(spinning) return;
  const names = getNames();
  if(names.length === 0) return;

  spinning = true;

  let velocity = 0;
  let acceleration = 0.3;
  let deceleration = 0.992;
  let maxSpeed = 0.6;
  let time = 0;
  let totalTime = 2500 + Math.random()*1500;

  function animate(){
    time += 16;

    if(time < 500){
      velocity += acceleration*0.02;
      if(velocity > maxSpeed) velocity = maxSpeed;
    } else {
      velocity *= deceleration;
    }

    angle += velocity;

    drawWheel();

    if(velocity > 0.2) tickSound();

    if(time < totalTime || velocity > 0.002){
      requestAnimationFrame(animate);
    } else {
      finish(names);
    }
  }

  animate();
}

function finish(names){
  const winner = getWinner(names);
  winnerText.innerText = "🎉 " + winner;

  // vibration
  if(navigator.vibrate){
    navigator.vibrate([120,60,120]);
  }

  // screen shake
  document.body.animate([
    { transform: 'translateX(0)' },
    { transform: 'translateX(-5px)' },
    { transform: 'translateX(5px)' },
    { transform: 'translateX(0)' }
  ], { duration: 300 });

  winSound();

  spinning = false;
}

spinBtn.onclick = spin;

drawWheel();
</script>

</body>
</html>
