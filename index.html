<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin Wheel</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f4f4f4;
  text-align: center;
}

.container {
  padding: 15px;
}

textarea {
  width: 280px;
  height: 120px;
  margin-bottom: 10px;
}

button {
  padding: 10px 16px;
  margin: 4px;
  border-radius: 6px;
  border: none;
  background: #0077cc;
  color: white;
  cursor: pointer;
}

.wheel-wrap {
  position: relative;
  width: 360px;
  height: 360px;
  margin: 10px auto;
}

canvas {
  width: 360px;
  height: 360px;
}

.pointer {
  position: absolute;
  top: -2px;
  left: 50%;
  transform: translateX(-50%);
  border-left: 15px solid transparent;
  border-right: 15px solid transparent;
  border-bottom: 25px solid red;
}

.result {
  font-size: 22px;
  margin-top: 10px;
}
</style>
</head>

<body>
<div class="container">
<h2>Spin the Wheel</h2>

<textarea id="namesInput"></textarea><br>

<button onclick="buildWheel()">Build</button>
<button onclick="spin()">Spin</button>
<button onclick="clearNames()">Clear</button>

<div class="wheel-wrap">
<div class="pointer"></div>
<canvas id="wheel" width="360" height="360"></canvas>
</div>

<div class="result" id="result">Winner: —</div>
</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const input = document.getElementById("namesInput");

const KEY = "wheelNames_v2";

let items = [];
let rotation = 0;

function save() {
  localStorage.setItem(KEY, input.value);
}

function load() {
  const data = localStorage.getItem(KEY);
  input.value = data ? data : "Bob\nSue\nMike\nJen";
}

function clearNames() {
  localStorage.removeItem(KEY);
  input.value = "";
  items = [];
  draw();
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function buildWheel(){
  save();

  let base = input.value.split("\n").map(x=>x.trim()).filter(x=>x);

  let repeated=[];
  for(let i=0;i<3;i++){  // <<< CHANGED TO 3
    repeated.push(...base);
  }

  items = shuffle(repeated);
  rotation = 0;
  draw();
}

function draw(){
  ctx.clearRect(0,0,360,360);

  if(items.length===0) return;

  let arc = (Math.PI*2)/items.length;

  for(let i=0;i<items.length;i++){
    let angle = rotation + i*arc;

    ctx.beginPath();
    ctx.moveTo(180,180);
    ctx.arc(180,180,160,angle,angle+arc);
    ctx.fillStyle = "hsl("+(i*30)+",80%,60%)";
    ctx.fill();

    ctx.save();
    ctx.translate(180,180);
    ctx.rotate(angle+arc/2);
    ctx.fillStyle="#fff";
    ctx.font="12px Arial";
    ctx.fillText(items[i],140,0);
    ctx.restore();
  }
}

function spin(){
  let start = performance.now();
  let target = rotation + Math.PI*2*(8+Math.random()*3);

  function anim(t){
    let p = Math.min((t-start)/5000,1);
    let eased = 1-Math.pow(1-p,3);

    rotation = rotation + (target-rotation)*eased;
    draw();

    if(p<1){
      requestAnimationFrame(anim);
    } else {
      let index = Math.floor(((Math.PI*2 - (rotation%(Math.PI*2))) / (Math.PI*2)) * items.length);
      document.getElementById("result").textContent = "Winner: " + items[index];
    }
  }

  requestAnimationFrame(anim);
}

load();
buildWheel();
</script>

</body>
</html>
